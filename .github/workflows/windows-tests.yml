name: Windows Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  local-regression:
    name: Local regression suite
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Strategic Nexus tests
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tools\run_all_tests.ps1
