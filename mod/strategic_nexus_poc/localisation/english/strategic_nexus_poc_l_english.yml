l_english:
 strategic_nexus.1002.name: "Strategic Nexus PoC"
 strategic_nexus.1002.desc: "PoC event Strategic Nexus byl spuštěn. Stellaris přijal runtime effect/event cestu. Následující diagnostická okna ukážou, které jednotlivé kontroly prošly."
 strategic_nexus.1002.a: "PoC event spuštěn"
 strategic_nexus.1100.name: "Strategic Nexus PoC: Globální flag"
 strategic_nexus.1100.desc: "Globální bridge flag byl detekován. Event přečetl strategic_nexus_bridge_available z globálního stavu hry."
 strategic_nexus.1100.a: "Globální bridge flag detekován"
 strategic_nexus.1101.name: "Strategic Nexus PoC: Country flag"
 strategic_nexus.1101.desc: "Country bridge flag byl detekován. Event přečetl strategic_nexus_bridge_available ze scope aktuální říše."
 strategic_nexus.1101.a: "Country bridge flag detekován"
 strategic_nexus.1102.name: "Strategic Nexus PoC: Doktrína"
 strategic_nexus.1102.desc: "Doktrínový flag byl detekován. Event přečetl předem definovaný balance-against-hegemon doktrínový flag."
 strategic_nexus.1102.a: "Doktrínový flag detekován"
 strategic_nexus.1103.name: "Strategic Nexus PoC: Proměnná tlaku"
 strategic_nexus.1103.desc: "Větev s proměnnou tlaku prošla. Event přečetl strategic_nexus_pressure a potvrdil, že je nad diagnostickým prahem."
 strategic_nexus.1103.a: "Proměnná tlaku prošla"
 strategic_nexus.1104.name: "Strategic Nexus PoC: Fallback"
 strategic_nexus.1104.desc: "Fallback větev prošla. Nebyl detekován žádný bridge availability flag, takže mod použil scripted fallback cestu."
 strategic_nexus.1104.a: "Fallback větev prošla"
 strategic_nexus.1105.name: "Strategic Nexus PoC: Diagnostický modifier"
 strategic_nexus.1105.desc: "Diagnostický modifier byl aplikován. Neškodný dočasný country modifier strategic_nexus_poc_bridge_seen byl přidán po detekci doktríny."
 strategic_nexus.1105.a: "Diagnostický modifier aplikován"
 strategic_nexus.1201.name: "Strategic Nexus PoC: SP start probe"
 strategic_nexus.1201.desc: "Singleplayer on_game_start_country se spustil. To potvrzuje, že on_action hook umí při startu SP hry vyvolat Strategic Nexus country event."
 strategic_nexus.1201.a: "SP start probe potvrzen"
 strategic_nexus.1202.name: "Strategic Nexus PoC: Monthly probe"
 strategic_nexus.1202.desc: "Měsíční country pulse se spustil. To potvrzuje, že Strategic Nexus umí po startu hry nebo loadu save spustit country-scoped scripted probe."
 strategic_nexus.1202.a: "Monthly probe potvrzen"
 strategic_nexus.1300.name: "Strategic Nexus PoC: MP payload autorita"
 strategic_nexus.1300.desc: "Tahle říše vytvořila jednorázový MP payload. Bridge available, doktrína balance-against-hegemon a tlak 0.74 byly zapsány jako předem definované testovací hodnoty. Tohle není finální host bridge, jen synchronizační PoC."
 strategic_nexus.1300.a: "MP payload vytvořen"
 strategic_nexus.1302.name: "Strategic Nexus PoC: MP payload pozorován"
 strategic_nexus.1302.desc: "Tahle říše uviděla globální MP payload vytvořený jinou říší. Pokud se potom objevily diagnostiky globálního bridge flagu a doktríny, hra synchronizovala bounded payload do běžného mod scriptu."
 strategic_nexus.1302.a: "MP payload pozorován"
 strategic_nexus.1400.name: "Strategic Nexus PoC: Strategy dimensions"
 strategic_nexus.1400.desc: "Modulární strategy_dimensions receiver byl spuštěn. Následující diagnostiky ukážou, jestli mod vidí předem definované hodnoty military_posture a research_bias."
 strategic_nexus.1400.a: "Strategy dimensions receiver spuštěn"
 strategic_nexus.1410.name: "Strategic Nexus PoC: Military posture"
 strategic_nexus.1410.desc: "Dimenze military_posture=defensive byla detekována. Mod přečetl předem definovaný flag pro defenzivní vojenský postoj."
 strategic_nexus.1410.a: "Defensive posture detekován"
 strategic_nexus.1411.name: "Strategic Nexus PoC: Military posture"
 strategic_nexus.1411.desc: "Dimenze military_posture=aggressive byla detekována. Mod přečetl předem definovaný flag pro agresivní vojenský postoj."
 strategic_nexus.1411.a: "Aggressive posture detekován"
 strategic_nexus.1412.name: "Strategic Nexus PoC: Research bias"
 strategic_nexus.1412.desc: "Dimenze research_bias=economy byla detekována. Mod přečetl předem definovaný flag pro ekonomické výzkumné zaměření."
 strategic_nexus.1412.a: "Economy research bias detekován"
 strategic_nexus.1413.name: "Strategic Nexus PoC: Research bias"
 strategic_nexus.1413.desc: "Dimenze research_bias=military_industry byla detekována. Mod přečetl předem definovaný flag pro vojensko-průmyslové výzkumné zaměření."
 strategic_nexus.1413.a: "Military industry research bias detekován"
 strategic_nexus.1414.name: "Strategic Nexus PoC: Strategy fallback"
 strategic_nexus.1414.desc: "Fallback pro strategy_dimensions prošel. Nebyl detekován žádný podporovaný modular strategy dimension flag, takže mod zůstává na scripted fallback chování."
 strategic_nexus.1414.a: "Strategy fallback prošel"
 strategic_nexus_poc_bridge_seen: "Strategic Nexus PoC: Bridge signál detekován"
 strategic_nexus_poc_bridge_seen_desc: "Vývojový diagnostický marker. Strategic Nexus PoC mod detekoval bounded bridge signál."
